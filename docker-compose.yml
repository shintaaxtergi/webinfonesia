version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: infonesia_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: infonesia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: infonesia_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
